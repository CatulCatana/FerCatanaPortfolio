<!DOCTYPE html>

<head>

    <header id="main-header">
        <a href="index.html" class="logo">

        <div class="project-header">

                </figure>

                <figure style="margin: 0 0 4rem 0;">
                    <img src="assets/2023-archive/Bulma.gif" alt="Bulma" style="width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">

                <figure style="margin: 0 0 4rem 0;">

                </figure>

                <figure style="margin: 0 0 4rem 0;">

                <figure style="margin: 0 0 4rem 0;">
                    <img src="assets/2023-archive/Unused ps2 Gawr Gura Model.png" alt="Unused ps2 Gawr Gura Model" style="width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">

                <figure style="margin: 0 0 4rem 0;">
